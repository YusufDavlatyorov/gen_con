{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="auth-wrapper" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="glass-card auth-card" style="max-width: 400px; width: 100%; padding: 40px; border-radius: 28px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); position: relative;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 data-t="hero-title-reset" style="font-weight: 900; font-size: 1.8rem; color: var(--text-main); letter-spacing: -1px; margin-bottom: 10px;">
                {% trans "Reset Password" %}
            </h2>
            <p data-t="hero-subtitle-reset" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5;">
                {% trans "Enter your email and we'll send you a secure link to reconnect." %}
            </p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="input-group" style="margin-bottom: 25px; position: relative; text-align: left;">
                <label data-t="label-email" style="display: block; color: var(--text-main); font-weight: 600; font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7;">
                    {% trans "Email Address" %}
                </label>
                <div id="email-wrapper" style="position: relative;">
                    <input type="email" name="email" required placeholder="name@example.com" data-t="ph-email"
                           style="width: 100%; padding: 14px 15px 14px 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); font-size: 1rem; transition: 0.3s; outline: none;">
                    
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                         style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: 0.3s;">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn-reset" data-t="btn-reset-send" style="width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <span data-t="btn-reset-text">{% trans "Send Reset Link" %}</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="{% url 'login' %}" data-t="btn-login-link" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.3s;">
                {% trans "Back to Login" %}
            </a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Принудительная синхронизация с JS словарем при загрузке
        if (window.updateLanguageUI) {
            const lang = localStorage.getItem('pref-lang') || 'en';
            window.updateLanguageUI(lang);
        }
    });
</script>

<style>
/* Твои существующие стили */
input:focus { border-color: var(--primary) !important; background: rgba(255,255,255,0.08) !important; box-shadow: 0 0 15px var(--primary-glow); }
input:focus + .input-icon { color: var(--primary) !important; transform: translateY(-50%) scale(1.1); }
.btn-reset:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); filter: brightness(1.1); }
.auth-card { animation: authAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes authAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
input:not(:placeholder-shown):valid + .input-icon { animation: iconPulse 2s infinite; }
@keyframes iconPulse { 0% { transform: translateY(-50%) scale(1); opacity: 0.7; } 50% { transform: translateY(-50%) scale(1.2); opacity: 1; } 100% { transform: translateY(-50%) scale(1); opacity: 0.7; } }
</style>
{% endblock %}
