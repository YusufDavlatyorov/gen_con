{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="error-wrapper" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="error-glass-card" style="max-width: 500px; width: 100%; text-align: center; padding: 50px 30px; border-radius: 30px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); position: relative;">
        
        <div class="error-bg-glow"></div>

        <div class="error-code-container">
            <h1 class="error-code">404</h1>
            <div class="error-code-overlay">404</div>
        </div>

        <h2 style="font-weight: 800; font-size: 1.5rem; color: var(--text-main); margin: 20px 0 10px; letter-spacing: -0.5px;">
            {% trans "Lost in Connection?" %}
        </h2>
        
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px;">
            {% trans "The page you are looking for has been disconnected or moved to another care node." %}
        </p>

        {% if error %}
            <p style="color: var(--accent); font-size: 0.85rem; margin-bottom: 20px;">
                {{ error }}
            </p>
        {% endif %}

        <a href="{% url 'home' %}" class="btn-back-home" style="text-decoration: none; display: inline-flex; align-items: center; gap: 10px; padding: 15px 35px; background: var(--primary); color: white; border-radius: 14px; font-weight: 700; transition: 0.4s;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            {% trans "Back to Safety" %}
        </a>
    </div>
</div>

<style>
.error-code-container {
    position: relative;
    display: inline-block;
    margin-bottom: 10px;
}

.error-code {
    font-size: 8rem;
    font-weight: 900;
    margin: 0;
    color: var(--text-main);
    letter-spacing: -5px;
    line-height: 1;
    opacity: 0.1;
}

.error-code-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    font-size: 8rem;
    font-weight: 900;
    color: var(--primary);
    letter-spacing: -5px;
    line-height: 1;
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    animation: glitch 3s infinite linear alternate-reverse;
}

@keyframes glitch {
    0% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
    20% { transform: translate(-3px, 2px); clip-path: polygon(0 15%, 100% 15%, 100% 30%, 0 30%); }
    40% { transform: translate(3px, -1px); clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%); }
    60% { transform: translate(-1px, 3px); }
    100% { transform: translate(0); }
}

.error-bg-glow {
    position: absolute;
    width: 150px;
    height: 150px;
    background: var(--primary);
    filter: blur(80px);
    opacity: 0.15;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
}

.btn-back-home:hover {
    transform: scale(1.05) translateX(-5px);
    box-shadow: 0 10px 30px var(--primary-glow);
    filter: brightness(1.1);
}

.btn-back-home:hover svg {
    transform: translateX(-3px);
    transition: 0.3s;
}

.error-glass-card {
    animation: errorAppear 0.6s ease-out;
}

@keyframes errorAppear {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}
</style>
{% endblock %}
