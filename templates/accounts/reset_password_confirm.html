{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="auth-wrapper" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="glass-card reset-card" style="max-width: 420px; width: 100%; padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); position: relative;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="shield-icon-box" style="width: 60px; height: 60px; background: var(--primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; box-shadow: 0 10px 25px var(--primary-glow);">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h2 style="font-weight: 900; font-size: 1.8rem; color: var(--text-main); letter-spacing: -1px; margin-bottom: 5px;">
                {% trans "Secure Reset" %}
            </h2>
            <p style="color: var(--text-muted); font-size: 0.85rem;">
                {% trans "Create a strong password to protect your connection." %}
            </p>
        </div>

        <form method="post" class="reset-form">
            {% csrf_token %}
            
            <div class="input-group" style="margin-bottom: 20px;">
                <label style="display: block; color: var(--text-main); font-weight: 700; font-size: 0.75rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.5px;">
                    {% trans "New Password" %}
                </label>
                <div style="position: relative;">
                    <input type="password" name="password1" id="id_password1" required placeholder="••••••••" 
                           style="width: 100%; padding: 14px 15px 14px 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); outline: none; transition: 0.3s;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%);">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <div class="strength-meter" style="height: 4px; width: 100%; background: rgba(255,255,255,0.1); margin-top: 10px; border-radius: 10px; overflow: hidden;">
                    <div id="strength-bar" style="height: 100%; width: 0%; transition: 0.4s ease;"></div>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 30px;">
                <label style="display: block; color: var(--text-main); font-weight: 700; font-size: 0.75rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.5px;">
                    {% trans "Confirm Password" %}
                </label>
                <div style="position: relative;">
                    <input type="password" name="password2" id="id_password2" required placeholder="••••••••" 
                           style="width: 100%; padding: 14px 15px 14px 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); outline: none; transition: 0.3s;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%);">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn-confirm-reset" style="width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; letter-spacing: 1px; cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px var(--primary-glow);">
                {% trans "Update Password" %}
            </button>
        </form>
    </div>
</div>

<script>
    // Простая логика индикатора сложности
    const passInput = document.getElementById('id_password1');
    const strengthBar = document.getElementById('strength-bar');

    passInput.addEventListener('input', () => {
        const val = passInput.value;
        let strength = 0;
        if (val.length > 5) strength += 33;
        if (val.match(/[A-Z]/)) strength += 33;
        if (val.match(/[0-9]/) || val.match(/[^A-Za-z0-9]/)) strength += 34;

        strengthBar.style.width = strength + '%';
        
        if (strength <= 33) strengthBar.style.background = '#ff4b5c'; // Слабый
        else if (strength <= 67) strengthBar.style.background = '#ffca2c'; // Средний
        else strengthBar.style.background = 'var(--primary)'; // Сильный
    });
</script>

<style>
/* Фокус полей */
input:focus {
    border-color: var(--primary) !important;
    background: rgba(255,255,255,0.1) !important;
    box-shadow: 0 0 20px var(--primary-glow);
}

.btn-confirm-reset:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px var(--primary-glow);
    filter: brightness(1.1);
}

/* Анимация карточки */
.reset-card {
    animation: resetAppear 0.7s cubic-bezier(0.19, 1, 0.22, 1);
}

@keyframes resetAppear {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.shield-icon-box {
    animation: pulseShield 2s infinite alternate;
}

@keyframes pulseShield {
    from { transform: scale(1); box-shadow: 0 10px 25px var(--primary-glow); }
    to { transform: scale(1.05); box-shadow: 0 15px 35px var(--primary-glow); }
}
</style>
{% endblock %}
