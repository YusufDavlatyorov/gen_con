        const langOrder = ['en', 'ru', 'tj'];

        // 2. ФУНКЦИЯ ОБНОВЛЕНИЯ ЯЗЫКА
        function updateLanguageUI(lang) {
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                const translation = translations[lang][key];
                
                if (translation) {
                    // Если это поле ввода (INPUT) — меняем placeholder
                    if (el.tagName === 'INPUT') {
                        el.placeholder = translation;
                    } else {
                        // Для всех остальных элементов (H2, P, SPAN, A, BUTTON) — меняем текст
                        el.innerText = translation;
                    }
                }
            });
            // Обновляем текст на кнопке переключателя
            document.getElementById('langTxt').innerText = lang.toUpperCase();
            document.documentElement.lang = lang;
        }

        // 3. ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА
        function toggleLang() {
            let current = localStorage.getItem('pref-lang') || 'en';
            let currentIndex = langOrder.indexOf(current);
            let nextIndex = (currentIndex + 1) % langOrder.length;
            let nextLang = langOrder[nextIndex];
            
            localStorage.setItem('pref-lang', nextLang);
            updateLanguageUI(nextLang);
        }

        // 4. ЛОГИКА ТЕМЫ (Светлая / Темная)
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('pref-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                // Иконка Солнца
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            } else {
                // Иконка Луны
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            }
        }

        // 5. ЗАПУСК ПРИ ЗАГРУЗКЕ
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('pref-lang') || 'en';
            updateLanguageUI(savedLang);
            
            const savedTheme = localStorage.getItem('pref-theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        });

        // Делаем функцию доступной глобально для скриптов в дочерних шаблонах
        window.updateLanguageUI = updateLanguageUI;
    </script>
